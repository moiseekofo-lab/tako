services:
  - type: web
    name: tako-public
    runtime: static
    rootDir: public-site
    staticPublishPath: .
    autoDeploy: true

  - type: web
    name: tako-1
    runtime: static
    buildCommand: npm ci && npm run build:web
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: EXPO_PUBLIC_API_URL
        value: https://tako-8whp.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: tako-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: SENDGRID_FROM_NAME
        sync: false
