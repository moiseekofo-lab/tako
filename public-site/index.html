<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#061F68" />
    <title>TaKo - Liens officiels</title>
    <meta
      name="description"
      content="TaKo, transport et paiement en RDC. Retrouvez le site officiel, le support, l'application et les canaux d'information."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Alkatra:wght@500;600;700&family=Inter:wght@500;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --tako-blue: #061f68;
        --tako-gold: #ffc35c;
        --ink: #0b1220;
        --white: #ffffff;
        --soft: rgba(255, 255, 255, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, Arial, sans-serif;
        color: var(--white);
        background:
          radial-gradient(circle at 16% 10%, rgba(255, 195, 92, 0.34), transparent 24%),
          radial-gradient(circle at 92% 18%, rgba(255, 255, 255, 0.18), transparent 26%),
          linear-gradient(160deg, #061f68 0%, #0a2a82 52%, #061f68 100%);
      }

      main {
        width: min(100%, 760px);
        min-height: 100vh;
        margin: 0 auto;
        padding: 42px 24px 36px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 18px;
        margin-top: 20px;
      }

      .mark {
        position: relative;
        width: 94px;
        height: 82px;
        flex: 0 0 auto;
      }

      .dot {
        position: absolute;
        left: 0;
        top: 15px;
        width: 30px;
        height: 30px;
        border-radius: 999px;
        background: var(--white);
      }

      .slash {
        position: absolute;
        left: 48px;
        top: 3px;
        width: 34px;
        height: 74px;
        border-radius: 999px;
        background: var(--tako-gold);
        transform: rotate(29deg);
      }

      .word {
        font-family: Alkatra, cursive;
        font-size: clamp(64px, 14vw, 104px);
        line-height: 0.92;
        letter-spacing: 0;
        color: var(--white);
      }

      .tagline {
        max-width: 610px;
        margin: 28px auto 34px;
        font-size: clamp(25px, 6vw, 38px);
        line-height: 1.08;
        text-align: center;
        font-weight: 500;
      }

      .links {
        width: 100%;
        display: grid;
        gap: 18px;
      }

      .link {
        min-height: 78px;
        padding: 0 28px;
        border-radius: 999px;
        background: var(--white);
        color: var(--ink);
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        font-size: clamp(19px, 4.4vw, 27px);
        font-weight: 800;
        box-shadow: 0 16px 34px rgba(0, 0, 0, 0.18);
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      .link:active,
      .link:hover {
        transform: translateY(-2px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.24);
      }

      .link svg {
        width: 28px;
        height: 28px;
        flex: 0 0 auto;
      }

      .socials {
        margin-top: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: clamp(18px, 6vw, 44px);
        flex-wrap: wrap;
      }

      .social {
        width: 70px;
        height: 70px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        color: var(--tako-gold);
        background: #020711;
        text-decoration: none;
        font-size: 31px;
        font-weight: 900;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
      }

      .footer {
        margin-top: auto;
        padding-top: 44px;
        text-align: center;
        color: rgba(255, 255, 255, 0.76);
        font-size: 14px;
        font-weight: 700;
      }

      @media (max-width: 520px) {
        main {
          padding: 32px 18px 28px;
        }

        .logo {
          gap: 12px;
        }

        .mark {
          width: 72px;
          height: 64px;
        }

        .dot {
          width: 23px;
          height: 23px;
          top: 12px;
        }

        .slash {
          left: 37px;
          width: 27px;
          height: 57px;
        }

        .link {
          min-height: 72px;
          padding: 0 20px;
        }

        .social {
          width: 62px;
          height: 62px;
          font-size: 28px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero" aria-label="TaKo">
        <div class="logo" aria-label="TaKo">
          <div class="mark" aria-hidden="true">
            <span class="dot"></span>
            <span class="slash"></span>
          </div>
          <div class="word">TaKo</div>
        </div>

        <p class="tagline">Transport, paiement et recharge simple en République Démocratique du Congo</p>
      </section>

      <nav class="links" aria-label="Liens officiels TaKo">
        <a class="link" href="https://takotransport.online">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"></circle><path d="M2 12h20"></path><path d="M12 2a15.3 15.3 0 0 1 0 20"></path><path d="M12 2a15.3 15.3 0 0 0 0 20"></path>
          </svg>
          Site officiel
        </a>

        <a class="link" href="https://wa.me/243000000000">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 11.5a8.4 8.4 0 0 1-12.4 7.4L3 20.4l1.6-5.4A8.5 8.5 0 1 1 21 11.5Z"></path><path d="M9.5 8.8c.2-.4.4-.4.7-.4h.5c.2 0 .4.1.5.4l.7 1.6c.1.3.1.5-.1.7l-.4.5c.7 1.2 1.7 2.1 2.9 2.7l.5-.6c.2-.2.4-.3.7-.2l1.6.7c.3.1.4.3.4.6v.5c0 .4-.2.6-.5.8-.5.3-1 .4-1.6.3-3.5-.5-6.2-3.1-6.8-6.6 0-.6.1-1.1.4-1.6Z"></path>
          </svg>
          Écrire à TaKo
        </a>

        <a class="link" href="https://takotransport.online/app">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="7" y="2" width="10" height="20" rx="2"></rect><path d="M11 18h2"></path>
          </svg>
          Télécharger l’application
        </a>

        <a class="link" href="https://takotransport.online/points">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 10c0 5-8 12-8 12S4 15 4 10a8 8 0 1 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle>
          </svg>
          Points de service
        </a>

        <a class="link" href="mailto:support@takotransport.online">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"></circle><path d="M9.1 9a3 3 0 1 1 5.8 1c-.5 1.4-2.3 1.7-2.7 3"></path><path d="M12 17h.01"></path>
          </svg>
          Centre d’aide
        </a>

        <a class="link" href="https://wa.me/243000000000">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 11.5a8.4 8.4 0 0 1-12.4 7.4L3 20.4l1.6-5.4A8.5 8.5 0 1 1 21 11.5Z"></path><path d="M8.5 12h7"></path><path d="M8.5 15h4"></path><path d="M8.5 9h7"></path>
          </svg>
          Canal d’actualités WhatsApp
        </a>
      </nav>

      <section class="socials" aria-label="Réseaux sociaux">
        <a class="social" href="#" aria-label="Facebook">f</a>
        <a class="social" href="#" aria-label="X">𝕏</a>
        <a class="social" href="#" aria-label="TikTok">♪</a>
        <a class="social" href="#" aria-label="LinkedIn">in</a>
      </section>

      <footer class="footer">© 2026 TaKo. Accessible, sécurisé et rapide.</footer>
    </main>
  </body>
</html>
